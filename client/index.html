<!DOCTYPE html>
<html lang="en">
<head>
   <title>Carousel of Vistas</title>
   <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>

    <div id="gridcontainer">
        <h1>Carousel of Vistas!</h1>
        <h2>Choose your favorite location to see a revolving carousel of vista images.</h2>
        <p>
            <label for="category">Select a location: </label>
            <select name="category" id="category">
                <option value="">-- Select a location --</option>
                <option value="ireland">Ireland</option>
                <option value="newyorkcity">New York City</option>
                <option value="southwest-us">Southwest US</option>
            </select>
        </p>
        <p>
            <button id="fetchVistaImgBtn">Fetch Vista Images</button>
        </p>
        <div id="searchTerm"></div>
        <div id="vistaImgCarousel"></div>
    </div>
</body>

</html>
